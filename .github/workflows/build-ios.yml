name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned iOS IPA (no Apple account needed)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Find Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Workspace: $WORKSPACE   Scheme: $SCHEME"

      - name: Build iOS archive (unsigned)
        run: |
          set -o pipefail
          export NODE_BINARY=$(which node)
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/TimeClock.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            2>&1 | tee "$RUNNER_TEMP/xbuild.log"

      - name: Show build errors (only runs on failure)
        if: failure()
        run: |
          echo "====== BUNDLE SCRIPT OUTPUT ======"
          grep -A 100 "PhaseScriptExecution Bundle" "$RUNNER_TEMP/xbuild.log" | head -120 || true
          echo ""
          echo "====== ALL ERROR LINES ======"
          grep -iE "error|unable to resolve|cannot find|module not found|SyntaxError|FAILED" "$RUNNER_TEMP/xbuild.log" | grep -v "note:" | head -80 || true
          echo ""
          echo "====== LAST 50 LINES OF LOG ======"
          tail -50 "$RUNNER_TEMP/xbuild.log" || true

      - name: Package as IPA
        run: |
          APP_DIR="$RUNNER_TEMP/TimeClock.xcarchive/Products/Applications"
          APP_NAME=$(ls "$APP_DIR" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_DIR/$APP_NAME" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "TimeClock.ipa" Payload
          echo "IPA size: $(du -h TimeClock.ipa | cut -f1)"

      - name: Upload IPA as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeClock-iOS-build-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/TimeClock.ipa
          retention-days: 30
