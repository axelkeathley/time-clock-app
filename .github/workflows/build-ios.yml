name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:   # lets you trigger a build manually from GitHub

jobs:
  build:
    name: Build iOS with EAS
    runs-on: ubuntu-latest   # EAS does the actual Mac compilation in the cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA
        run: eas build --platform ios --profile preview --non-interactive
