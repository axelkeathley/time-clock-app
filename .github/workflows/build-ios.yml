name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned iOS IPA (no Apple account needed)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Bundle JavaScript and compile Hermes bytecode
        run: |
          BUNDLE_OUT="$RUNNER_TEMP/main.jsbundle"
          ASSETS_OUT="$RUNNER_TEMP/assets"
          mkdir -p "$ASSETS_OUT"

          echo "=== Metro bundler ==="
          node node_modules/.bin/react-native bundle \
            --entry-file index.ts \
            --platform ios \
            --dev false \
            --bundle-output "$BUNDLE_OUT" \
            --assets-dest "$ASSETS_OUT" \
            --reset-cache
          echo "Bundle size: $(wc -c < "$BUNDLE_OUT") bytes"

          echo "=== Hermes bytecode compilation ==="
          # Prefer hermesc that ships with the installed pods (matches the Hermes runtime in the app)
          HERMESC=$(find ios/Pods -name "hermesc" -type f 2>/dev/null | head -1)
          # Fallback: hermesc bundled with react-native
          if [ -z "$HERMESC" ]; then
            HERMESC=$(find node_modules/react-native/sdks/hermesc -name "hermesc" -type f 2>/dev/null | head -1)
          fi

          if [ -n "$HERMESC" ] && [ -f "$HERMESC" ]; then
            echo "Found hermesc: $HERMESC"
            "$HERMESC" -emit-binary -out "${BUNDLE_OUT}.hbc" "$BUNDLE_OUT"
            mv "${BUNDLE_OUT}.hbc" "$BUNDLE_OUT"
            echo "HBC size: $(wc -c < "$BUNDLE_OUT") bytes"
          else
            echo "hermesc not found — keeping raw JS bundle"
          fi

      - name: Find Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Workspace: $WORKSPACE   Scheme: $SCHEME"

      - name: Build iOS archive (unsigned, JS bundling skipped)
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/TimeClock.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            SKIP_BUNDLING=1 \
            NODE_BINARY="$(which node)" \
            2>&1 | tee "$RUNNER_TEMP/xbuild.log"

      - name: Inject JS bundle into archive
        run: |
          APP_DIR="$RUNNER_TEMP/TimeClock.xcarchive/Products/Applications"
          APP_NAME=$(ls "$APP_DIR" | head -1)
          APP_PATH="$APP_DIR/$APP_NAME"
          echo "Injecting bundle into: $APP_PATH"
          cp "$RUNNER_TEMP/main.jsbundle" "$APP_PATH/main.jsbundle"
          if [ "$(ls -A "$RUNNER_TEMP/assets" 2>/dev/null)" ]; then
            cp -r "$RUNNER_TEMP/assets/." "$APP_PATH/"
          fi
          echo "Done. App contents:"
          ls "$APP_PATH" | grep -E "(jsbundle|assets)" || echo "(no bundle files listed)"

      - name: Upload full build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xbuild-log-${{ github.run_number }}
          path: ${{ runner.temp }}/xbuild.log
          retention-days: 7

      - name: Package as IPA
        run: |
          APP_DIR="$RUNNER_TEMP/TimeClock.xcarchive/Products/Applications"
          APP_NAME=$(ls "$APP_DIR" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_DIR/$APP_NAME" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "TimeClock.ipa" Payload
          echo "IPA size: $(du -h TimeClock.ipa | cut -f1)"

      - name: Upload IPA as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeClock-iOS-build-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/TimeClock.ipa
          retention-days: 30
